<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>В календарь — генератор ICS</title>
    <meta
      name="description"
      content="Создайте событие и скачайте файл ICS для Apple Calendar, Android, Google Calendar и Outlook."
    >
    <meta property="og:type" content="website">
    <meta property="og:title" content="В календарь — генератор ICS">
    <meta
      property="og:description"
      content="Создайте событие и скачайте файл ICS для Apple Calendar, Android, Google Calendar и Outlook."
    >
    <meta property="og:locale" content="ru_RU">
    <meta name="theme-color" content="#f6f5f2">
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="header">
        <div>
          <p class="eyebrow" data-i18n="eyebrow">Черновик хранится только в текущей сессии.</p>
          <div class="brand-row">
            <span class="brand-mark" aria-hidden="true">
              <span></span>
            </span>
            <h1 data-i18n="brand">В календарь</h1>
          </div>
          <p class="lead" data-i18n-html="lead">Создайте событие и скачайте готовый файл <code>.ics</code>.</p>
          <p class="muted" data-i18n="privacy">Все данные обрабатываются только в вашем браузере.</p>
        </div>

        <div class="header-controls">
          <div class="theme-switcher" data-i18n-aria-label="languageLabel" aria-label="Язык">
            <span class="theme-title" data-i18n="language">Язык</span>
            <div class="segmented is-two" role="group" data-i18n-aria-label="languageChoiceLabel" aria-label="Выбор языка">
              <button class="theme-button" type="button" data-language-choice="ru">RU</button>
              <button class="theme-button" type="button" data-language-choice="en">EN</button>
            </div>
          </div>

          <div class="theme-switcher" data-i18n-aria-label="themeLabel" aria-label="Тема оформления">
            <span class="theme-title" data-i18n="theme">Тема</span>
            <div class="segmented" role="group" data-i18n-aria-label="themeChoiceLabel" aria-label="Выбор темы">
              <button class="theme-button" type="button" data-theme-choice="system" data-i18n="themeSystem">Системная</button>
              <button class="theme-button" type="button" data-theme-choice="light" data-i18n="themeLight">Светлая</button>
              <button class="theme-button" type="button" data-theme-choice="dark" data-i18n="themeDark">Тёмная</button>
            </div>
          </div>
        </div>
      </header>

      <main class="app-layout">
        <form class="event-form" id="event-form" novalidate>
          <section class="form-section" aria-labelledby="basic-title">
            <h2 id="basic-title" data-i18n="basicTitle">Основные данные</h2>

            <div class="field">
              <label for="title" data-i18n="titleLabel">Название события</label>
              <input id="title" name="title" type="text" autocomplete="off" data-i18n-placeholder="titlePlaceholder" placeholder="DevOops 2026">
              <p class="field-error" id="title-error" aria-live="polite"></p>
            </div>

            <div class="field">
              <label for="description" data-i18n="descriptionLabel">Описание</label>
              <textarea
                id="description"
                name="description"
                rows="5"
                data-i18n-placeholder="descriptionPlaceholder"
                placeholder="Конференция для DevOps, SRE и platform-инженеров."
              ></textarea>
              <p class="field-error" id="description-error" aria-live="polite"></p>
            </div>

            <div class="two-columns">
              <div class="field">
                <label for="start-date" data-i18n="startDateLabel">Дата начала</label>
                <input id="start-date" name="startDate" type="date">
                <p class="field-error" id="start-date-error" aria-live="polite"></p>
              </div>

              <div class="field time-field">
                <label for="start-time" data-i18n="startTimeLabel">Время начала</label>
                <input id="start-time" name="startTime" type="time">
                <p class="field-error" id="start-time-error" aria-live="polite"></p>
              </div>
            </div>

            <div class="two-columns">
              <div class="field">
                <label for="end-date" data-i18n="endDateLabel">Дата окончания</label>
                <input id="end-date" name="endDate" type="date">
                <p class="field-error" id="end-date-error" aria-live="polite"></p>
              </div>

              <div class="field time-field">
                <label for="end-time" data-i18n="endTimeLabel">Время окончания</label>
                <input id="end-time" name="endTime" type="time">
                <p class="field-error" id="end-time-error" aria-live="polite"></p>
              </div>
            </div>

            <label class="check-row" for="all-day">
              <input id="all-day" name="allDay" type="checkbox">
              <span data-i18n="allDayLabel">Весь день</span>
            </label>
          </section>

          <section class="form-section" aria-labelledby="extra-title">
            <h2 id="extra-title" data-i18n="extraTitle">Дополнительно</h2>

            <div class="two-columns">
              <div class="field">
                <label for="format" data-i18n="formatLabel">Формат мероприятия</label>
                <select id="format" name="format">
                  <option value="offline" data-i18n="formatOffline">Офлайн</option>
                  <option value="online" data-i18n="formatOnline">Онлайн</option>
                  <option value="hybrid" data-i18n="formatHybrid">Гибрид</option>
                </select>
                <p class="field-error" id="format-error" aria-live="polite"></p>
              </div>

              <div class="field">
                <label for="reminder" data-i18n="reminderLabel">Напоминание</label>
                <select id="reminder" name="reminder">
                  <option value="none" data-i18n="reminderNone">Без напоминания</option>
                  <option value="PT10M" data-i18n="reminder10m">За 10 минут</option>
                  <option value="PT30M" data-i18n="reminder30m">За 30 минут</option>
                  <option value="PT1H" data-i18n="reminder1h">За 1 час</option>
                  <option value="P1D" data-i18n="reminder1d">За 1 день</option>
                  <option value="P1W" data-i18n="reminder1w">За 1 неделю</option>
                </select>
                <p class="field-error" id="reminder-error" aria-live="polite"></p>
              </div>
            </div>

            <div class="field" id="location-field">
              <label for="location" data-i18n="locationLabel">Местоположение</label>
              <input
                id="location"
                name="location"
                type="text"
                autocomplete="street-address"
                data-i18n-placeholder="locationPlaceholder"
                placeholder="Санкт-Петербург, Экспофорум"
              >
              <p class="field-error" id="location-error" aria-live="polite"></p>
            </div>

            <div class="field">
              <label for="event-url" data-i18n="eventUrlLabel">Ссылка на мероприятие</label>
              <input id="event-url" name="eventUrl" type="url" inputmode="url" placeholder="https://example.com">
              <p class="field-error" id="event-url-error" aria-live="polite"></p>
            </div>

            <div class="field">
              <label for="registration-url" data-i18n="registrationUrlLabel">Ссылка на регистрацию</label>
              <input
                id="registration-url"
                name="registrationUrl"
                type="url"
                inputmode="url"
                placeholder="https://example.com/register"
              >
              <p class="field-error" id="registration-url-error" aria-live="polite"></p>
            </div>

            <div class="field">
              <label for="organizer" data-i18n="organizerLabel">Организатор</label>
              <input id="organizer" name="organizer" type="text" autocomplete="organization" data-i18n-placeholder="organizerPlaceholder" placeholder="Название организатора">
              <p class="field-error" id="organizer-error" aria-live="polite"></p>
            </div>
          </section>

        </form>

        <aside class="preview-panel" aria-labelledby="preview-title">
          <div class="preview-heading">
            <h2 id="preview-title" data-i18n="previewTitle">Предпросмотр</h2>
            <span class="timezone" id="timezone-label"></span>
          </div>
          <div class="preview-card" id="preview" aria-live="polite">
            <p class="empty-preview" data-i18n="emptyPreview">Заполните данные события — здесь появится предпросмотр.</p>
          </div>
        </aside>

        <div class="actions" data-i18n-aria-label="actionsLabel" aria-label="Основные действия">
          <button class="button button-primary" type="submit" form="event-form" data-i18n="downloadButton">Скачать .ics</button>
          <button class="button button-secondary" type="button" id="clear-button" data-i18n="clearButton">Очистить</button>
        </div>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  </body>
</html>
